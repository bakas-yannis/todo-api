name: .NET 10 Docker CI

# This defines WHEN the action runs
on:
  pull_request:
    branches: [ "main" ]  # Runs when a PR is opened to main
  push:
    branches: [ "main" ]  # Also runs when you merge into main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository || 'bakas-yannis/todo-api' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code onto the GitHub runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Build the Docker image
      # This will automatically run 'dotnet restore', 'build', and 'test' 
      # because they are stages in your Dockerfile.
      - name: Build and Test with Docker
        run: |
          docker build -t todo-api-ci:${{ github.sha }} .

      - name: Confirm build succeeded  # This only runs if the above passed
        run: echo "✅ Build and tests passed for ${{ github.sha }}"

# 🚀 Only runs when merged into main — builds, tags and pushes to GHCR
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set short SHA
        run: |
          SHA="${{ github.sha }}"
          echo "SHORT_SHA=${SHA:-$(git rev-parse --short HEAD)}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-,format=short

      - name: Build and Push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          cache-to: type=inline
